<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>StreamShare</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-left">
        <span class="room-label">Room</span>
        <strong id="room-code" title="Cliquer pour copier"></strong>
        <span id="copied-msg">Copié !</span>
      </div>
      <div class="chips-row" id="user-chips"></div>
    </header>

    <main class="viewer">
      <video id="main-video" autoplay playsinline></video>
      <div class="placeholder" id="placeholder">
        <p class="placeholder-title">Aucun écran sélectionné</p>
        <p class="placeholder-sub">Clique sur un participant pour voir son écran</p>
      </div>
    </main>

    <footer class="controls">
      <select id="quality-select">
        <option value="720p">720p</option>
        <option value="1080p" selected>1080p</option>
        <option value="1440p">1440p</option>
      </select>
      <div class="spacer"></div>
      <button class="btn btn-share" id="share-btn">Partager mon écran</button>
      <button class="btn btn-fs" id="fs-btn" title="Plein écran">⛶</button>
      <button class="btn btn-danger" id="leave-btn">Quitter</button>
    </footer>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="room.js"></script>
</body>
</html>
